<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}Monitoramento de Obras{% endblock %}</title>
  <style>
    :root { --bg:#f7f7f5; --card:#fff; --line:#e3e3df; --ink:#23231f; --muted:#76766f; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { background:var(--card); border-bottom:1px solid var(--line); padding:14px 22px; }
    header nav a { margin-right:18px; text-decoration:none; color:var(--ink); font-weight:600; }
    header nav a:hover { color:#0a7; }
    main { max-width:920px; margin:24px auto; padding:0 18px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px 18px; margin-bottom:16px; }
    h1 { font-size:20px; margin:0 0 4px; } h2 { font-size:16px; margin:18px 0 8px; }
    .item { padding:8px 0; border-bottom:1px dashed var(--line); }
    .item:last-child { border-bottom:0; }
    .meta { color:var(--muted); font-size:13px; }
    .urg-critica { color:#c0392b; font-weight:700; } .urg-alta { color:#d35400; font-weight:600; }
    .urg-media { color:#b7950b; } .urg-baixa { color:var(--muted); }
    input, select, button { font:inherit; padding:7px 10px; border:1px solid var(--line); border-radius:7px; }
    button { background:#0a7; color:#fff; border:0; cursor:pointer; }
    .vazio { color:var(--muted); font-style:italic; }
    form.inline { display:inline; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">Relatório do dia</a>
      <a href="/historico">Histórico</a>
      <a href="/grupos">Grupos</a>
      <a href="/saude">Saúde</a>
    </nav>
  </header>
  <main>{% block conteudo %}{% endblock %}</main>
</body>
</html>
