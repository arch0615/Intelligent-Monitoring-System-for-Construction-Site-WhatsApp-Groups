<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · Monreal Obras</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#04060e; --card:rgba(20,31,56,.55); --ink:#e6eaf2; --muted:#8b94a8; --line:#2b4878; --accent:#3b82f6; --crit:#f87171; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
      font-family:'Manrope',system-ui,sans-serif; background:
        radial-gradient(1100px 500px at 50% -10%, #0e1b36 0%, transparent 60%), var(--bg); color:var(--ink); }
    .auth { width:100%; max-width:380px; background:var(--card); border:1px solid var(--line); border-radius:16px;
      padding:30px 28px; box-shadow:0 20px 60px rgba(0,0,0,.4); backdrop-filter:blur(12px); }
    .brand { display:flex; align-items:center; gap:11px; margin-bottom:22px; }
    .brand .logo { width:40px; height:40px; border-radius:10px; background:var(--accent); display:grid; place-items:center; color:#fff; font-weight:800; font-size:20px; }
    .brand b { display:block; font-size:16px; } .brand span { font-size:12px; color:var(--muted); }
    h1 { font-size:19px; margin:0 0 4px; } .sub { color:var(--muted); font-size:13.5px; margin:0 0 20px; }
    label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
    input { width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:10px; background:#0c1426; color:var(--ink); font:inherit; }
    input:focus { outline:2px solid rgba(59,130,246,.35); border-color:var(--accent); }
    button { width:100%; margin-top:22px; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font:inherit; font-weight:700; cursor:pointer; }
    button:hover { filter:brightness(1.08); }
    .erro { background:rgba(248,113,113,.14); color:var(--crit); font-size:13px; font-weight:600; padding:10px 12px; border-radius:9px; margin-bottom:6px; }
    .alt { text-align:center; margin-top:18px; font-size:13.5px; color:var(--muted); }
    .alt a { color:var(--accent); font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
  <form class="auth" method="post" action="/login">
    <div class="brand"><div class="logo">M</div><div><b>Monreal</b><span>Monitor de Obras</span></div></div>
    <h1>Entrar</h1>
    <p class="sub">Acesse o painel de monitoramento.</p>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    <label for="email">E-mail</label>
    <input id="email" name="email" type="email" required autofocus autocomplete="username">
    <label for="senha">Senha</label>
    <input id="senha" name="senha" type="password" required autocomplete="current-password">
    <button type="submit">Entrar</button>
    <div class="alt">Não tem conta? <a href="/register">Criar conta</a></div>
  </form>
</body>
</html>
