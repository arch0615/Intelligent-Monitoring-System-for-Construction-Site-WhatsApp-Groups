<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · Monreal Obras</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#04060e; --ink:#e6eaf2; --muted:#8b94a8; --line:#2b4878; --accent:#3b82f6; --crit:#f87171; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:'Manrope',system-ui,sans-serif; background:var(--bg); color:var(--ink); }
    .split { display:flex; min-height:100vh; }
    /* Lado da imagem: painel com a MESMA proporção da imagem (sem margens) */
    .hero { position:relative; overflow:hidden; background:#0a1526; flex:0 0 auto; height:100vh; aspect-ratio:2176/2912; max-width:60vw; }
    .hero > img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; }
    .hero .scrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(4,6,14,.12) 0%, rgba(4,6,14,.72) 100%); }
    .hero-text { position:relative; z-index:1; margin-top:auto; padding:52px; }
    .hero-badge { display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:700; color:#cfe0ff; background:rgba(59,130,246,.2); border:1px solid rgba(91,143,214,.4); padding:6px 12px; border-radius:999px; }
    .hero-badge::before { content:""; width:8px; height:8px; border-radius:50%; background:#4ade80; }
    .hero-text h2 { font-size:29px; line-height:1.2; margin:16px 0 10px; max-width:440px; }
    .hero-text p { color:#c3ccdd; font-size:15px; line-height:1.55; max-width:430px; margin:0; }
    /* Lado do formulário */
    .formside { flex:1 1 0; min-width:0; display:grid; place-items:center; padding:28px; }
    .auth { width:100%; max-width:390px; }
    .brand { display:flex; align-items:center; gap:11px; margin-bottom:24px; }
    .brand .logo { width:40px; height:40px; border-radius:10px; background:var(--accent); display:grid; place-items:center; color:#fff; font-weight:800; font-size:20px; }
    .brand b { display:block; font-size:16px; } .brand span { font-size:12px; color:var(--muted); }
    h1 { font-size:22px; margin:0 0 4px; } .sub { color:var(--muted); font-size:13.5px; margin:0 0 22px; }
    label { display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
    input { width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:10px; background:#0c1426; color:var(--ink); font:inherit; }
    input:focus { outline:2px solid rgba(59,130,246,.35); border-color:var(--accent); }
    button { width:100%; margin-top:24px; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font:inherit; font-weight:700; cursor:pointer; }
    button:hover { filter:brightness(1.08); }
    .erro { background:rgba(248,113,113,.14); color:var(--crit); font-size:13px; font-weight:600; padding:10px 12px; border-radius:9px; margin-bottom:4px; }
    .alt { text-align:center; margin-top:20px; font-size:13.5px; color:var(--muted); }
    .alt a { color:var(--accent); font-weight:600; text-decoration:none; }
    @media (max-width:860px) { .split { grid-template-columns:1fr; } .hero { display:none; } }
  </style>
</head>
<body>
  <div class="split">
    <div class="hero">
      <img src="/static/auth.jpg" alt="Gestão de Obras — Monitoramento Inteligente via WhatsApp">
    </div>
    <div class="formside">
      <form class="auth" method="post" action="/login">
        <div class="brand"><div class="logo">M</div><div><b>Monreal</b><span>Monitor de Obras</span></div></div>
        <h1>Entrar</h1>
        <p class="sub">Acesse o painel de monitoramento.</p>
        {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required autofocus autocomplete="username">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" required autocomplete="current-password">
        <button type="submit">Entrar</button>
        <div class="alt">Não tem conta? <a href="/register">Criar conta</a></div>
      </form>
    </div>
  </div>
</body>
</html>
