{% extends "base.html" %}
{% block titulo %}Dashboard{% endblock %}
{% block cabecalho %}Dashboard{% endblock %}
{% block subcabecalho %}Visão geral, com filtro por período e obra{% endblock %}

{% block conteudo %}
<style>
  .dash-filtros { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:flex-end; }
  .dash-filtros .seg { display:inline-flex; background:#0c1426; border:1px solid var(--line); border-radius:10px; padding:3px; gap:2px; }
  .dash-filtros .seg button { font:inherit; font-size:13px; font-weight:600; color:var(--muted); background:transparent; border:0; padding:7px 13px; border-radius:8px; cursor:pointer; transition:.15s; }
  .dash-filtros .seg button:hover { color:var(--ink); }
  .dash-filtros .seg button.on { background:var(--accent); color:#fff; }
  .dash-filtros select, .dash-filtros input[type=date] { min-width:0; }
  #dash-custom { display:none; gap:8px; }
  #dash-custom.show { display:inline-flex; }
  #dash-content.loading { opacity:.5; transition:opacity .15s; pointer-events:none; }
</style>

<div class="card pad" style="margin-bottom:16px">
  <div class="dash-filtros">
    <div class="seg" id="dash-periodo">
      <button data-p="todos">Todos</button>
      <button data-p="hoje">Hoje</button>
      <button data-p="7d">7 dias</button>
      <button data-p="30d">30 dias</button>
      <button data-p="custom">Personalizado</button>
    </div>
    <div id="dash-custom">
      <input type="date" id="dash-di" value="{{ f.di }}">
      <input type="date" id="dash-df" value="{{ f.df }}">
    </div>
    <select id="dash-obra">
      <option value="">Todas as obras</option>
      {% for g in grupos %}<option value="{{ g.id }}" {% if f.grupo_id == g.id %}selected{% endif %}>{{ g.nome or g.wa_jid }}</option>{% endfor %}
    </select>
  </div>
</div>

<div id="dash-content">{% include "dashboard_conteudo.html" %}</div>

<script>
  (function () {
    const state = { periodo: {{ f.periodo | tojson }}, grupo_id: {{ (f.grupo_id or '') | tojson }}, di: {{ f.di | tojson }}, df: {{ f.df | tojson }} };
    const seg = document.getElementById('dash-periodo');
    const custom = document.getElementById('dash-custom');
    const di = document.getElementById('dash-di');
    const df = document.getElementById('dash-df');
    const obra = document.getElementById('dash-obra');
    const content = document.getElementById('dash-content');

    function marcar() {
      seg.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.p === state.periodo));
      custom.classList.toggle('show', state.periodo === 'custom');
    }

    async function aplicar() {
      const q = new URLSearchParams({ periodo: state.periodo });
      if (state.grupo_id) q.set('grupo_id', state.grupo_id);
      if (state.periodo === 'custom') { if (di.value) q.set('di', di.value); if (df.value) q.set('df', df.value); }
      content.classList.add('loading');
      try {
        const r = await fetch('/dashboard/fragmento?' + q.toString());
        if (!r.ok) throw new Error('http ' + r.status);
        content.innerHTML = await r.text();
        history.replaceState(null, '', '/dashboard?' + q.toString());
      } catch (e) {
        console.error(e);
      } finally {
        content.classList.remove('loading');
      }
    }

    seg.addEventListener('click', function (e) {
      const b = e.target.closest('button'); if (!b) return;
      state.periodo = b.dataset.p; marcar();
      if (state.periodo === 'custom' && !(di.value && df.value)) return; // espera as duas datas
      aplicar();
    });
    di.addEventListener('change', () => { if (state.periodo === 'custom' && di.value && df.value) aplicar(); });
    df.addEventListener('change', () => { if (state.periodo === 'custom' && di.value && df.value) aplicar(); });
    obra.addEventListener('change', () => { state.grupo_id = obra.value; aplicar(); });

    marcar();
  })();
</script>
{% endblock %}
