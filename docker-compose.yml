# =====================================================================
# Sistema de Monitoramento Inteligente — Grupos de WhatsApp de Obras
# Sobe todo o ambiente com um comando: docker compose up -d
#
#   postgres  -> banco de dados (mensagens, mídia-metadados, resultados)
#   redis     -> fila/buffer que desacopla captura do processamento
#   capture   -> worker Node.js + Baileys (Etapa 1)
#   pipeline  -> worker Python (Whisper/ffmpeg/Claude) (Etapa 2)
#   api       -> FastAPI: relatório, histórico, painel (Etapas 3-5)
# =====================================================================
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migrations rodam automaticamente na primeira subida do banco
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    # Exposto apenas no localhost do servidor (acesso via túnel SSH), nunca na internet.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Protegido por senha (requirepass) e SEM porta publicada: acessível apenas
    # pela rede interna do Docker. Fecha o vetor de sequestro por REPLICAOF.
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      # Deixa o redis-cli do healthcheck autenticar automaticamente.
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  capture:
    build: ./capture-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Sessão do WhatsApp persistida no host (sobrevive a restart do contêiner)
      - ./capture-worker/auth_state:/app/auth_state
      - ./media:/media
    # Necessário para ler o pairing code na primeira conexão:
    #   docker compose logs -f capture
    stdin_open: true
    tty: true

  pipeline:
    build: ./pipeline
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./media:/media
      - ./pipeline/models:/app/models

  # API / Painel / Relatórios — FastAPI + APScheduler (Etapa 3)
  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    # Não publicado na internet: acesso externo só via Caddy (HTTPS).
    # 127.0.0.1:8000 fica disponível apenas no servidor (debug/health local).
    ports:
      - "127.0.0.1:8000:8000"

  # Proxy reverso + HTTPS automático (Let's Encrypt) — serve o domínio público
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
