# =====================================================================
# Sistema de Monitoramento Inteligente — Grupos de WhatsApp de Obras
# Sobe todo o ambiente com um comando: docker compose up -d
#
#   postgres  -> banco de dados (mensagens, mídia-metadados, resultados)
#   redis     -> fila/buffer que desacopla captura do processamento
#   capture   -> worker Node.js + Baileys (Etapa 1)
#   pipeline  -> worker Python (Whisper/ffmpeg/Claude) (Etapa 2)
#   api       -> FastAPI: relatório, histórico, painel (Etapas 3-5)
# =====================================================================
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migrations rodam automaticamente na primeira subida do banco
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  capture:
    build: ./capture-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Sessão do WhatsApp persistida no host (sobrevive a restart do contêiner)
      - ./capture-worker/auth_state:/app/auth_state
      - ./media:/media
    # Necessário para ler o pairing code na primeira conexão:
    #   docker compose logs -f capture
    stdin_open: true
    tty: true

  pipeline:
    build: ./pipeline
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./media:/media
      - ./pipeline/models:/app/models

  # API / Painel / Relatórios — FastAPI + APScheduler (Etapa 3)
  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
  redisdata:
